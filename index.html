<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concursos de Arquitetura & Archviz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #e4e2db;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --warning: #b45309;
      --warning-bg: #fffbeb;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --pro: #7c3aed;
      --pro-bg: #f5f3ff;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── Header ── */
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .header p  { font-size: 13px; color: var(--muted); }
    .updated   { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Search + filters ── */
    .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); font-size: 13px; font-family: inherit;
      color: var(--text); outline: none;
    }
    #search:focus { border-color: var(--accent); }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-family: inherit;
      transition: all .12s;
    }
    .chip:hover { border-color: #aaa; color: var(--text); }
    .chip.active { background: var(--accent-bg); color: var(--accent); border-color: #93c5fd; }
    .chip.active[data-type="archviz"]    { background: #fdf2ff; color: #7e22ce; border-color: #e9d5ff; }
    .chip.active[data-type="conceito"]   { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .chip.active[data-type="estudantil"] { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
    .chip.active[data-type="open"]       { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

    /* ── Stats bar ── */
    .stats { display: flex; gap: 16px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat { font-size: 12px; color: var(--muted); }
    .stat strong { color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color .15s;
      border-top: 3px solid var(--border);
    }
    .card:hover { border-color: #bbb; border-top-color: var(--card-accent, #bbb); }
    .card[data-type="archviz"]    { border-top-color: #a855f7; --card-accent: #a855f7; }
    .card[data-type="conceito"]   { border-top-color: #f97316; --card-accent: #f97316; }
    .card[data-type="estudantil"] { border-top-color: #10b981; --card-accent: #10b981; }
    .card[data-type="open"]       { border-top-color: #3b82f6; --card-accent: #3b82f6; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: 14px; font-weight: 500; line-height: 1.35; flex: 1; }

    .badge {
      font-size: 11px; font-weight: 500; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-archviz    { background: #fdf2ff; color: #7e22ce; border: 1px solid #e9d5ff; }
    .badge-conceito   { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-estudantil { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .badge-open       { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    .card-org { font-size: 12px; color: var(--muted); }
    .card-desc { font-size: 12px; color: #4b5563; line-height: 1.55; }

    .meta { display: flex; flex-direction: column; gap: 5px; }
    .meta-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #4b5563; }
    .meta-row svg { flex-shrink: 0; color: var(--muted); }

    .prize { color: var(--success); font-weight: 500; }

    .days {
      font-size: 11px; font-weight: 500; padding: 2px 6px;
      border-radius: 4px; margin-left: auto;
    }
    .days-ok     { background: var(--success-bg); color: var(--success); }
    .days-warn   { background: var(--warning-bg); color: var(--warning); }
    .days-urgent { background: var(--danger-bg);  color: var(--danger);  }
    .days-closed { background: #f3f4f6;           color: var(--muted);   }

    .card-footer { margin-top: 2px; padding-top: 8px; border-top: 1px solid var(--border); }
    .ext-link {
      font-size: 12px; color: var(--accent); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .ext-link:hover { text-decoration: underline; }

    /* ── Empty / Loading ── */
    .message { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; grid-column: 1/-1; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Source legend ── */
    .legend { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .legend a { color: var(--accent); text-decoration: none; }
    .legend a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>🏛 Concursos de Arquitetura &amp; Archviz</h1>
    <p>Competições internacionais abertas — atualizado automaticamente todo dia</p>
    <p class="updated" id="updated-at"></p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar por nome, organizador ou local..." />
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="grid" id="grid">
    <div class="message"><div class="spinner"></div><br>Carregando concursos...</div>
  </div>

  <div class="legend">
    Fontes: <a href="https://competitions.archi" target="_blank">competitions.archi</a> ·
    <a href="https://architecturecompetitions.com" target="_blank">Buildner</a> ·
    <a href="https://bustler.net/competitions" target="_blank">Bustler</a> ·
    <a href="https://www.archdaily.com/architecture-competitions" target="_blank">ArchDaily</a>
    — Dados atualizados via GitHub Actions diariamente.
  </div>
</div>

<script>
const TYPE_LABEL = { archviz: 'Archviz', conceito: 'Conceito', estudantil: 'Estudantil', open: 'Aberto' };
const TYPE_CLASS = { archviz: 'badge-archviz', conceito: 'badge-conceito', estudantil: 'badge-estudantil', open: 'badge-open' };

let allData = [];
let activeFilter = 'all';

function daysUntil(deadlineStr) {
  if (!deadlineStr) return null;
  const [d, m, y] = deadlineStr.split('/').map(Number);
  const diff = Math.round((new Date(y, m - 1, d) - new Date()) / 86400000);
  return diff;
}

function daysEl(deadlineStr) {
  const d = daysUntil(deadlineStr);
  if (d === null) return '';
  if (d < 0)  return `<span class="days days-closed">encerrado</span>`;
  if (d <= 21) return `<span class="days days-urgent">${d}d restantes</span>`;
  if (d <= 60) return `<span class="days days-warn">${d}d restantes</span>`;
  return `<span class="days days-ok">${d}d restantes</span>`;
}

function icon(path) {
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}
const ICON_CAL   = icon('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>');
const ICON_PRIZE = icon('<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>');
const ICON_GLOBE = icon('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>');
const ICON_EXT   = icon('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>');

function renderGrid() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const filtered = allData.filter(c => {
    const matchType = activeFilter === 'all' || c.type === activeFilter;
    const matchQ = !q || [c.title, c.org, c.location].join(' ').toLowerCase().includes(q);
    return matchType && matchQ;
  });

  const open = filtered.filter(c => (daysUntil(c.deadline) ?? 1) >= 0).length;
  document.getElementById('stats').innerHTML =
    `<span class="stat"><strong>${filtered.length}</strong> concursos</span>` +
    `<span class="stat"><strong>${open}</strong> abertos</span>`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="message">Nenhum concurso encontrado.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="card" data-type="${c.type}">
      <div class="card-top">
        <span class="card-title">${esc(c.title)}</span>
        <span class="badge ${TYPE_CLASS[c.type] || 'badge-open'}">${TYPE_LABEL[c.type] || c.type}</span>
      </div>
      <span class="card-org">${esc(c.org)} · ${esc(c.location)}</span>
      <p class="card-desc">${esc(c.desc)}</p>
      <div class="meta">
        <div class="meta-row">
          ${ICON_CAL}
          <span>Submissão: ${c.deadline || '—'}</span>
          ${daysEl(c.deadline)}
        </div>
        <div class="meta-row">${ICON_PRIZE}<span class="prize">${esc(c.prize)}</span></div>
        <div class="meta-row">${ICON_GLOBE}<span>${esc(c.lang)}</span></div>
      </div>
      <div class="card-footer">
        <a class="ext-link" href="${esc(c.url)}" target="_blank" rel="noopener">
          Ver detalhes ${ICON_EXT}
        </a>
      </div>
    </div>
  `).join('');
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initFilters() {
  const types = ['all', 'archviz', 'conceito', 'estudantil', 'open'];
  const labels = { all: 'Todos', archviz: 'Archviz', conceito: 'Conceito', estudantil: 'Estudantil', open: 'Aberto geral' };
  document.getElementById('filters').innerHTML = types.map(t =>
    `<button class="chip${t === activeFilter ? ' active' : ''}" data-type="${t}" onclick="setFilter('${t}')">${labels[t]}</button>`
  ).join('');
}

function setFilter(t) { activeFilter = t; initFilters(); renderGrid(); }

document.getElementById('search').addEventListener('input', renderGrid);

// ── Load data ──
fetch('competitions.json')
  .then(r => r.json())
  .then(data => {
    allData = data.competitions || [];
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      document.getElementById('updated-at').textContent =
        'Última atualização: ' + d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    }
    initFilters();
    renderGrid();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      `<div class="message">Não foi possível carregar os dados.<br>Verifique se o arquivo <code>competitions.json</code> existe no repositório.</div>`;
  });
</script>
</body>
</html>
